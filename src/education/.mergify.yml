pull_request_rules:
    - name: Auto-close PRs on stable branch
      conditions:
          - and:
                - and:
                      - author!=tuwafula
                      - author!=mergify[bot]
                - or:
                      - base=version-16
      actions:
          close:
          comment:
              message: |
                  @{{author}}, thanks for the contribution, but we do not accept pull requests on a stable branch. Please raise PR on develop branch.

    - name: backport to develop
      conditions:
          - label="backport develop"
      actions:
          backport:
              branches:
                  - develop
              assignees:
                  - "{{ author }}"

    - name: backport to version-16-hotfix
      conditions:
          - label="backport version-16-hotfix"
      actions:
          backport:
              branches:
                  - version-16-hotfix
              assignees:
                  - "{{ author }}"

    - name: Automatic merge on CI success and review
      conditions:
        - status-success=linters
        - "#approved-reviews-by>=1"
      actions:
        merge:
          method: merge