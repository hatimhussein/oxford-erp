# LiteSpeed / OpenLiteSpeed reverse proxy for https://arrdh.com/oxforderp
# Host terminates SSL; traffic goes to Docker nginx at 127.0.0.1:8088
#
# Apply ONE method below, then retest:
#   curl -sI https://arrdh.com/oxforderp/desk

# =============================================================================
# Method A — .htaccess in document root (fastest)
# File: /home/arrdh.com/public_html/.htaccess  (prepend these rules at the TOP)
# =============================================================================
#
# <IfModule mod_rewrite.c>
# RewriteEngine On
# RewriteRule ^oxforderp$ /oxforderp/ [R=301,L]
# RewriteRule ^oxforderp/(.*)$ http://127.0.0.1:8088/oxforderp/$1 [P,L]
# </IfModule>

# =============================================================================
# Method B — DirectAdmin Custom HTTPD Config (arrdh.com)
# Paste into: DirectAdmin → Domains → arrdh.com → Custom HTTPD Config
# Then: Save + rewrite configs / restart LiteSpeed
# =============================================================================
#
# ProxyPass /oxforderp/socket.io ws://127.0.0.1:8088/oxforderp/socket.io
# ProxyPass /oxforderp http://127.0.0.1:8088/oxforderp
# ProxyPass /oxforderp/ http://127.0.0.1:8088/oxforderp/
# ProxyPassReverse /oxforderp/ http://127.0.0.1:8088/oxforderp/

# =============================================================================
# Method C — OpenLiteSpeed native (Example vhost)
# =============================================================================
#
# extprocessor oxforderp_docker {
#   type                    proxy
#   address                 127.0.0.1:8088
#   maxConns                200
#   pcKeepAliveTimeout      60
#   initTimeout             60
#   retryTimeout            0
#   respBuffer              0
# }
#
# context /oxforderp/ {
#   type                    proxy
#   handler                 oxforderp_docker
#   addDefaultCharset       off
# }
