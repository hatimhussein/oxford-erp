# Host reverse-proxy for https://arrdh.com/oxforderp → Docker nginx (127.0.0.1:8088)
#
# Without this, https://arrdh.com/oxforderp returns 404 from the host website.
# Prefer:  bash scripts/install-host-proxy.sh   (as root)
#
# Or paste ONE of the blocks below into the HTTPS vhost for arrdh.com.

# -----------------------------------------------------------------------------
# DirectAdmin → Custom HTTPD Config for arrdh.com
# File: /usr/local/directadmin/data/users/<USER>/domains/arrdh.com.cust_httpd
# Then: da build rewrite_confs   (or CustomBuild → Rewrite Configs)
# -----------------------------------------------------------------------------
#
# ProxyPreserveHost On
# RequestHeader set X-Forwarded-Proto "https"
# ProxyPass        /oxforderp/socket.io  ws://127.0.0.1:8088/oxforderp/socket.io
# ProxyPassReverse /oxforderp/socket.io  ws://127.0.0.1:8088/oxforderp/socket.io
# ProxyPass        /oxforderp            http://127.0.0.1:8088/oxforderp
# ProxyPass        /oxforderp/           http://127.0.0.1:8088/oxforderp/
# ProxyPassReverse /oxforderp/           http://127.0.0.1:8088/oxforderp/

# -----------------------------------------------------------------------------
# Apache (generic HTTPS VirtualHost)
# -----------------------------------------------------------------------------
#
# ProxyPreserveHost On
# RequestHeader set X-Forwarded-Proto "https"
# RequestHeader set X-Forwarded-Port "443"
# ProxyPass        /oxforderp/socket.io  ws://127.0.0.1:8088/oxforderp/socket.io
# ProxyPassReverse /oxforderp/socket.io  ws://127.0.0.1:8088/oxforderp/socket.io
# ProxyPass        /oxforderp            http://127.0.0.1:8088/oxforderp
# ProxyPass        /oxforderp/           http://127.0.0.1:8088/oxforderp/
# ProxyPassReverse /oxforderp/           http://127.0.0.1:8088/oxforderp/

# -----------------------------------------------------------------------------
# Nginx (host) — inside: server { listen 443 ssl; server_name arrdh.com; }
# -----------------------------------------------------------------------------
