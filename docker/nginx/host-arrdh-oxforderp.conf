# Host reverse-proxy snippets for https://arrdh.com/oxforderp
# SSL stays on the host (existing arrdh.com certificate).
# Docker nginx listens on 127.0.0.1:8088 only.
#
# Pick ONE of the blocks below matching your host web server, then reload it.

# -----------------------------------------------------------------------------
# Apache (mod_proxy + mod_proxy_http + mod_proxy_wstunnel + mod_ssl)
# Place inside the HTTPS VirtualHost for arrdh.com
# -----------------------------------------------------------------------------
#
# ProxyPreserveHost On
# RequestHeader set X-Forwarded-Proto "https"
# RequestHeader set X-Forwarded-Port "443"
#
# ProxyPass        /oxforderp/socket.io  ws://127.0.0.1:8088/oxforderp/socket.io
# ProxyPassReverse /oxforderp/socket.io  ws://127.0.0.1:8088/oxforderp/socket.io
# ProxyPass        /oxforderp/           http://127.0.0.1:8088/oxforderp/
# ProxyPassReverse /oxforderp/           http://127.0.0.1:8088/oxforderp/

# -----------------------------------------------------------------------------
# Nginx (host) — include inside the server { listen 443 ssl; server_name arrdh.com; } block
# -----------------------------------------------------------------------------

